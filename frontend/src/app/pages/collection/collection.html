<div class="dashboard">

  <div class="sidebar">
    <div class="logo-container">
      <img src="/assets/logo.png" class="logo" />
    </div>

    <button routerLink="/dashboard">🏠 Home</button>
    <button routerLink="/collection">📚 Coleção</button>
    <button routerLink="/request">📨 Pedidos</button>
    <button routerLink="/lists">📂 Listas</button>

    <div class="sidebar-bottom">
      <button class="user-display" routerLink="/profile">
        👤 {{ user.username }}
      </button>
      <button (click)="logout()">⏻ Logout</button>
    </div>
  </div>

  <div class="main">

    <div *ngIf="message || error" class="toast-global" [ngClass]="{ 'error': error }">
      {{ error || message }}
    </div>

    <h1>📚 A Minha Coleção</h1>

    <div class="search-box">
      <select [(ngModel)]="sortField" (change)="sortCollection()">
        <option value="title">Título</option>
        <option value="artist">Artista</option>
        <option value="year">Ano</option>
        <option value="format">Formato</option>
        <option value="addedAt">Data</option>
      </select>

      <button (click)="toggleSort()">{{ sortDirection === 'asc' ? 'Crescente ▲' : 'Descendente ▼' }}</button>
    </div>

    <div class="results">

      <div 
        *ngFor="let item of collection" 
        class="artist-card"
        (click)="goToAlbum(item.albumId)"
      >

        <div class="card-left">

          <img 
            *ngIf="item.imageUrl"
            [src]="item.imageUrl"
            class="album-image"
            alt="album"
          />

          <div class="text-block">

            <div class="artist-name">
              {{ item.title }}
            </div>

            <div 
              class="artist-pill"
              (click)="goToArtist(item.artistId); $event.stopPropagation()"
            >
              🎧 {{ item.artist }}
            </div>

            <div class="meta-text">
              {{ item.year }} • {{ item.format }}
            </div>

            <div class="meta-text">
              {{ item.addedAt | date:'short' }}
            </div>

          </div>

        </div>

        <div class="card-right">

          <div class="ean">
            {{ item.ean13 }}
          </div>

          <button 
            class="remove-btn"
            (click)="removeFromCollection(item); $event.stopPropagation()"
          >
            ✕
          </button>

        </div>

      </div>

    </div>

    <div *ngIf="collection.length === 0" class="empty">
      Ainda não tens nada na coleção
    </div>

  </div>

</div>
