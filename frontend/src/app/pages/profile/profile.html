<div class="dashboard">

  <div class="logo-container">
    <img src="/assets/logo.png" class="logo" />
  </div>

  <div class="sidebar">
    <button routerLink="/dashboard">Dashboard</button>
    <button (click)="logout()">Logout</button>
  </div>

  <div class="main">

    <h1>Perfil</h1>

    <p *ngIf="!user" class="loading">A carregar perfil...</p>

    <button class="edit-btn" (click)="isEditing = true">
      Editar Perfil
    </button>

    <div class="profile-card" *ngIf="user">

      <div class="row">
        <span class="label">Username</span>
        <span class="value">{{ user.username }}</span>
      </div>

      <div class="row">
        <span class="label">Email</span>
        <span class="value">{{ user.email }}</span>
      </div>

      <div class="row">
        <span class="label">Data de nascimento</span>
        <span class="value">
          {{ user.birthDate | date:'dd/MM/yyyy' }}
        </span>
      </div>

      <div class="row">
        <span class="label">Artista Favorito</span>
        <span class="value">
          {{ user.favoriteArtist?.name || 'Nenhum artista definido' }}
        </span>
      </div>

    </div>

    <p *ngIf="error" class="error">{{ error }}</p>


    <div class="modal-overlay" *ngIf="isEditing">

      <div class="modal">

        <h2>Editar Perfil</h2>

        <input [(ngModel)]="editData.username" placeholder="Username" />
        <input [(ngModel)]="editData.email" placeholder="Email" />
        <input type="date" [(ngModel)]="editData.birthDate" />

        <div *ngIf="user && user.favoriteArtist !== null" class="fav-remove">
          <button (click)="removeFavorite()">Remover artista favorito</button>
        </div>

        <div class="password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="editData.password"
            placeholder="Nova password" />

          <span (click)="showPassword = !showPassword">
            {{ showPassword ? 'Hide' : 'Show' }}
          </span>
        </div>

        <div class="modal-actions">
          <button (click)="updateProfile()">Guardar</button>
          <button (click)="isEditing = false">Cancelar</button>
        </div>

      </div>

    </div>

  </div>

</div>
