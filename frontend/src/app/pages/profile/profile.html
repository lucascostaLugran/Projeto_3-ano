<div class="dashboard">

  <div class="sidebar">

    <div class="logo-container">
      <img src="/assets/logo.png" class="logo" />
    </div>

    <button routerLink="/dashboard">🏠 Home</button>
    <button routerLink="/collection">📚 Coleção</button>
    <button routerLink="/request">📨 Pedidos</button>

    <div class="sidebar-bottom">
      <button class="user-display" routerLink="/profile">
        👤 {{ user.username }}
      </button>
      <button (click)="logout()">⏻ Logout</button>
    </div>
  </div>

  <div class="main">

    <div *ngIf="message" class="toast-global">
      {{ message }}
    </div>

    <h1>Perfil</h1>

    <p *ngIf="!user" class="loading">A carregar perfil...</p>

    <button class="edit-btn" (click)="openEdit()">
      Editar Perfil
    </button>

    <div class="profile-card" *ngIf="user">

      <div class="row">
        <span class="label">Username</span>
        <span class="value">{{ user.username }}</span>
      </div>

      <div class="row">
        <span class="label">Email</span>
        <span class="value">{{ user.email }}</span>
      </div>

      <div class="row">
        <span class="label">Data de nascimento</span>
        <span class="value">
          {{ user.birthDate | date:'dd/MM/yyyy' }}
        </span>
      </div>

      <div class="row">
        <span class="label">Artista Favorito</span>

        <ng-container *ngIf="user.favoriteArtist; else noArtist">
          <span class="value artist-link" [routerLink]="['/artist', user.favoriteArtist._id]">
            🎧 {{ user.favoriteArtist.name }}
          </span>
        </ng-container>

        <ng-template #noArtist>
          <span class="value">Nenhum artista definido</span>
        </ng-template>
      </div>

    </div>

    <div class="modal-overlay" *ngIf="isEditing">

      <form class="modal" autocomplete="off">

        <!-- inputs fake para bloquear autofill -->
        <input type="text" style="display:none">
        <input type="password" style="display:none">

        <div *ngIf="message || error" class="toast" [ngClass]="{ 'error': error }">
          {{ error || message }}
        </div>

        <h2>Editar Perfil</h2>

        <div class="input-group">
          <input [(ngModel)]="editData.username" name="edit-username" placeholder=" " autocomplete="off" />
          <label>Username</label>
        </div>

        <div class="input-group">
          <input [(ngModel)]="editData.email" name="edit-email" placeholder=" " autocomplete="off" />
          <label>Email</label>
        </div>

        <div class="input-group">
          <input type="date" [(ngModel)]="editData.birthDate" name="edit-birth" placeholder=" " autocomplete="off" />
          <label>Data de nascimento</label>
        </div>

        <div *ngIf="user && user.favoriteArtist !== null" class="fav-remove">
          <button type="button" (click)="removeFavorite()">Remover artista favorito</button>
        </div>

        <div class="password-wrapper input-group">
          <input 
            type="password"
            [(ngModel)]="editData.currentPassword"
            name="nope-current"
            placeholder=" "
            autocomplete="off"
          />
          <label>Password atual</label>
        </div>

        <div class="password-wrapper input-group">
          <input 
            type="password"
            [(ngModel)]="editData.password"
            name="nope-new"
            placeholder=" "
            autocomplete="new-password"
          />
          <label>Nova password</label>
        </div>

        <div class="password-wrapper input-group">
          <input 
            type="password"
            [(ngModel)]="editData.confirmPassword"
            name="nope-confirm"
            placeholder=" "
            autocomplete="new-password"
          />
          <label>Confirmar password</label>
        </div>

        <div class="modal-actions">
          <button type="button" (click)="updateProfile()">Guardar</button>
          <button type="button" (click)="isEditing = false">Cancelar</button>
        </div>

      </form>

    </div>

  </div>

</div>
