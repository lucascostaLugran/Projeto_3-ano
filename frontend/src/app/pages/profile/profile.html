<div class="profile">

  <h2>Perfil</h2>

  <!-- INFO -->
  <div *ngIf="user">
    <p><strong>Username:</strong> {{ user.username }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Data de nascimento:</strong> {{ user.birthDate | date }}</p>

    <p *ngIf="user.favoriteArtist">
      <strong>Artista favorito:</strong> {{ user.favoriteArtist.name }}
    </p>

    <p *ngIf="!user.favoriteArtist">
      <strong>Artista favorito:</strong> Nenhum
    </p>
  </div>

  <hr />

  <!-- EDIT -->
  <h3>Editar Perfil</h3>

  <form (ngSubmit)="updateProfile()">

    <input
      type="email"
      placeholder="Novo email"
      [(ngModel)]="email"
      name="email"
    />

    <input
      type="password"
      placeholder="Nova password"
      [(ngModel)]="password"
      name="password"
    />

    <input
      type="date"
      [(ngModel)]="birthDate"
      name="birthDate"
    />

    <input
      type="password"
      placeholder="Password atual (obrigatório)"
      [(ngModel)]="currentPassword"
      name="currentPassword"
      required
    />

    <button type="submit">Atualizar</button>

  </form>

  <p style="color: green" *ngIf="message">{{ message }}</p>
  <p style="color: red" *ngIf="error">{{ error }}</p>

  <hr />

  <button (click)="goBack()">Voltar</button>

</div>
