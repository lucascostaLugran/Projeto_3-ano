<div class="logo-container">
  <img src="/assets/logo.png" class="logo" alt="Sonexa logo" />
</div>

<div class="dashboard">
  <div class="sidebar">
    <button routerLink="/dashboard">🏠 Home</button>
    <div class="sidebar-bottom">
      <button class="user-display" routerLink="/profile">👤 Perfil{{ user?.username || 'Perfil' }}</button>
      <button (click)="logout()">⏻ Logout</button>
    </div>
  </div>

  <div class="main" *ngIf="album">
    <div class="artist-container" style="width: 100%; max-width: 800px;">
      
      <div class="artist-row" style="display: flex; gap: 30px; align-items: center;">
        <img [src]="album.imageUrl" class="album-cover-styled" alt="Capa do álbum">
        <div class="artist-meta">
          <h1 class="artist-name" style="font-size: 32px;">{{ album.title }}</h1>
          <p class="subtitle">Artista: <strong style="color: #7f5af0;">{{ album.artist?.name || 'Vários Artistas' }}</strong></p>
          <p style="font-size: 12px; opacity: 0.5;">MBID: {{ album.mbid }}</p>
          <p>{{ album.year }} | {{ album.type | uppercase }}</p>
        </div>
      </div>

      <h2 class="section-title" style="margin-top: 40px;">Faixas</h2>
      <div class="albums" style="display: flex; flex-direction: column; gap: 10px;">
        <div *ngFor="let track of album.tracks" class="artist-card" style="padding: 15px; display: flex; justify-content: space-between;">
          <span>{{ track.number }}. {{ track.title }}</span>
          <span style="opacity: 0.6;">{{ track.duration }}s</span>
        </div>
      </div>

      <h2 class="section-title" style="margin-top: 40px;">Versões Disponíveis</h2>
      <div class="albums" style="display: flex; flex-direction: column; gap: 10px;">
        <div *ngFor="let v of album.versions" class="artist-card" style="padding: 15px; display: flex; justify-content: space-between;">
          <div>
            <strong style="color: #7f5af0;">{{ v.format | uppercase }}</strong>
            <div style="font-size: 12px; opacity: 0.7;">{{ v.description }}</div>
          </div>
          <code style="background: #232336; padding: 4px 8px; border-radius: 4px;">{{ v.ean13 }}</code>
        </div>
      </div>

    </div>
  </div>
</div>
