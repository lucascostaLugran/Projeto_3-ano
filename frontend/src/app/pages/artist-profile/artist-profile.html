<div class="dashboard">

  <div class="logo-container">
    <img src="/assets/logo.png" class="logo" />
  </div>

  <div class="sidebar">
    <button routerLink="/dashboard">🏠 Home</button>

    <div class="sidebar-bottom">
      <button class="user-display" routerLink="/profile">
        👤 {{ user.username }}
      </button>
      <button (click)="logout()">⏻ Logout</button>
    </div>
  </div>

  <div class="main">

    <div *ngIf="message" class="toast" [ngClass]="messageType">
      {{ message }}
    </div>

    <div *ngIf="artist" class="artist-container">

      <div class="artist-header">

        <div class="artist-row">

          <!-- IMAGEM -->
          <img *ngIf="artist.imageUrl" [src]="artist.imageUrl" class="artist-image" alt="Artist image" />

          <!-- TEXTO -->
          <div class="artist-meta">

            <div class="artist-top">
              <h1 class="artist-name">{{ artist.name }}</h1>

              <button class="fav-btn" (click)="toggleFavorite()">
                <span *ngIf="!isFavorite">🤍</span>
                <span *ngIf="isFavorite">❤️</span>
              </button>
            </div>

            <div class="artist-info">
              <p><strong>ISNI:</strong> {{ artist.isni }}</p>
              <p><strong>Ano de início:</strong> {{ artist.startYear }}</p>
            </div>

          </div>

        </div>

      </div>

      <h2 class="section-title">Álbuns recentes</h2>

      <div class="albums">
        <div *ngFor="let album of visibleAlbums" class="album-card">

          <div class="album-info">
            <p class="album-title">{{ album.title }}</p>
            <p class="album-type">{{ album.type }}</p>
          </div>

          <span class="album-year">{{ album.year }}</span>

        </div>
      </div>

      <!-- ✅ BOTÃO ADICIONADO -->
      <button 
        *ngIf="albums.length > 3" 
        class="show-more-btn" 
        (click)="toggleShowAll()"
      >
        {{ showAll ? 'Mostrar menos' : 'Mostrar mais' }}
      </button>

    </div>

    <div *ngIf="!artist">
      A carregar artista...
    </div>

  </div>

</div>
