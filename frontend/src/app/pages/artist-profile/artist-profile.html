<div class="dashboard">

  <div class="sidebar">

    <div class="logo-container">
      <img src="/assets/logo.png" class="logo" />
    </div>

    <button routerLink="/dashboard">🏠 Home</button>
    <button routerLink="/collection">📚 Coleção</button>

    <div class="sidebar-bottom">
      <button class="user-display" routerLink="/profile">
        👤 {{ user.username }}
      </button>
      <button (click)="logout()">⏻ Logout</button>
    </div>
  </div>

  <div class="main">

    <div *ngIf="message" class="toast" [ngClass]="messageType">
      {{ message }}
    </div>

    <div *ngIf="artist" class="artist-container">

      <div class="artist-header">

        <div class="artist-row">

          <img *ngIf="artist.imageUrl" [src]="artist.imageUrl" class="artist-image" alt="Artist image" />

          <div class="artist-meta">

            <div class="artist-top">
              <h1 class="artist-name">{{ artist.name }}</h1>

              <button class="fav-btn" (click)="toggleFavorite()">
                <span *ngIf="!isFavorite">🤍</span>
                <span *ngIf="isFavorite">❤️</span>
              </button>
            </div>

            <div class="artist-info">
              <p><strong>ISNI:</strong> {{ artist.isni }}</p>
              <p><strong>Ano de início:</strong> {{ artist.startYear }}</p>
              <p *ngIf="artist.description">{{ artist.description }}</p>
            </div>

          </div>

        </div>

      </div>

      <h2>
        {{ showAll ? 'Todos os álbuns' : 'Álbuns recentes' }}
      </h2>

      <div class="albums">

        <div 
          *ngFor="let album of visibleAlbums" 
          class="album-card"
          [routerLink]="['/album', album._id]"
        >

          <div class="album-row">

            <img 
              *ngIf="album.imageUrl"
              [src]="album.imageUrl"
              class="album-image"
              alt="album"
            />

            <div class="album-meta">
              <p class="album-title">{{ album.title }}</p>
            </div>

            <div class="album-right">
              <span class="album-year">{{ album.year }}</span>
              <span class="album-type">{{ album.type }}</span>
            </div>

          </div>

        </div>

      </div>

      <button 
        *ngIf="albums.length > 3" 
        class="show-more-btn" 
        (click)="toggleShowAll()"
      >
        {{ showAll ? 'Mostrar menos' : 'Mostrar mais' }}
      </button>

    </div>

    <div *ngIf="!artist">
      A carregar artista...
    </div>

  </div>

</div>
