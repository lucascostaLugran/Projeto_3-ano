<div class="logo-container">
  <img src="/assets/logo.png" class="logo" alt="Sonexa logo" />
</div>

<div class="dashboard">
  <div class="sidebar">
    <button routerLink="/dashboard">🏠 Home</button>

    <div class="sidebar-bottom">
      <button 
        class="user-display" 
        routerLink="/profile"
      >
        👤 {{ user.username }}
      </button>
      <button (click)="logout()">⏻ Logout</button>
    </div>
  </div>

  <div class="main">

    <h1>Dashboard</h1>

    <div class="search-box">

      <div class="input-group">
        <input 
          type="text"
          placeholder=" "
          [(ngModel)]="searchTerm"
        />
        <label>Pesquisar artistas...</label>
      </div>
    
      <button type="button" (click)="search()">
        Pesquisar
      </button>
    
    </div>

    <div class="results">

      <div *ngIf="error" class="error">{{ error }}</div>

      <div *ngFor="let artist of artists" class="artist-card">

        <h3 class="artist-name" [routerLink]="['/artist', artist._id]">
          {{ artist.name }}
        </h3>

        <p class="artist-description">
          {{ artist.description }}
        </p>

        <button class="fav-btn" (click)="addFavorite(artist._id)">
          Favorito
        </button>

      </div>

    </div>

  </div>

</div>
